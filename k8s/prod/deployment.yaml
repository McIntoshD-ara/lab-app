# lab-app/k8s/dev/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab-app
  namespace: prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lab-app
  template:
    metadata:
      labels:
        app: lab-app
    spec:
      containers:
        - name: lab-app
          image: ghcr.io/mcintoshd-ara/lab-app:latest
          ports:
            - containerPort: 5000
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
