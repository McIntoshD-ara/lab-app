# .github/workflows/gated_workflow.yml
name: Gated CI/CD Pipeline

on:
  push:
    branches: ["**"]

jobs:
  test-and-build:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6

      - name: Install dependencies
        run: |
          source ~/.venv/bin/activate
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          source ~/.venv/bin/activate
          PYTHONPATH=. pytest tests -v

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: string
        uses: ASzc/change-string-case-action@v8
        with:
          string: ${{ github.repository }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: |
            ghcr.io/${{ steps.string.outputs.lowercase }}:latest
            ghcr.io/${{ steps.string.outputs.lowercase }}:${{ github.sha }}

  deploy-prod:
    runs-on: self-hosted
    needs: test-and-build
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create image pull secret
        run: |
          kubectl create secret docker-registry ghcr-secret \
          --docker-server=ghcr.io \
          --docker-username=${{ github.actor }} \
          --docker-password=${{ secrets.GITHUB_TOKEN }} \
          --namespace=dev \
          --dry-run=client -o yaml | kubectl apply -f -

      - id: string
        uses: ASzc/change-string-case-action@v8
        with:
          string: ${{ github.repository }}

      - name: Apply manifests
        run: |
          kubectl apply -f ~/lab-app/k8s/

      - name: Deploy to prod
        run: |
          kubectl set image deployment/lab-app \
            lab-app=ghcr.io/${{ steps.string.outputs.lowercase }}:${{ github.sha }} \
            -n dev
          kubectl rollout status deployment/lab-app -n dev --timeout=60s
