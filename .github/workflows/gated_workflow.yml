# .github/workflows/gated_workflow.yml
name: Gated CI/CD Pipeline

on:
  push:
    branches: ["**"]

jobs:
  test-and-build:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6

      - name: Install dependencies
        run: |
          source ~/.venv/bin/activate
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          source ~/.venv/bin/activate
          PYTHONPATH=. pytest tests -v

  deploy-prod:
    runs-on: self-hosted
    needs: test-and-build
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Apply manifests
        run: |
          kubectl apply -f ~/lab-app/k8s/prod/

      - id: string
        uses: ASzc/change-string-case-action@v8
        with:
          string: ${{ github.repository }}
            
      - name: Deploy to prod
        run: |
          kubectl set image deployment/lab-app \
            lab-app=ghcr.io/${{ steps.string.outputs.lowercase }}:${{ github.sha }} \
            -n prod
          kubectl rollout status deployment/lab-app -n prod --timeout=60s
